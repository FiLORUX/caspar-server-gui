name: Notify thast-docs on docs change

# Tells the thast-docs hub to rebuild whenever the documentation that
# feeds into the published site at docs.thåst.se changes upstream.
#
# Required secret in this repository:
#   THAST_DOCS_DISPATCH_TOKEN
#     A fine-grained GitHub PAT scoped to FiLORUX/thast-docs with
#     "Contents: Read" + "Metadata: Read" only. No other access needed.

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger thast-docs rebuild
        env:
          GH_TOKEN: ${{ secrets.THAST_DOCS_DISPATCH_TOKEN }}
        run: |
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/FiLORUX/thast-docs/dispatches" \
            -d '{
              "event_type": "docs-update",
              "client_payload": {
                "source_repo": "${{ github.repository }}",
                "source_sha": "${{ github.sha }}",
                "source_ref": "${{ github.ref }}"
              }
            }'
